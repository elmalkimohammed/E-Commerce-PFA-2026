services:
  #___Infrastructure___
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-network
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ecommerce-network
  #___Databases___
  AuthServiceDB:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: "AuthService"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - AuthServiceDB-data:/var/lib/mysql
      - ./Back-End/AuthService/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-network
  ProductServiceDB:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ProductsDb
      MYSQL_ROOT_PASSWORD: admin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ProductServiceDB-data:/var/lib/mysql
      - ./Back-End/ProductService/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-network
  CartServiceDB:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: CartDb
      MYSQL_ROOT_PASSWORD: admin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - CartServiceDB-data:/var/lib/mysql
      - ./Back-End/CartService/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-network
  UserProfileDB:
    image: mysql:8.0
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: UserProfileDb
      MYSQL_ROOT_PASSWORD: admin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - UserProfileDB-data:/var/lib/mysql
      - ./Back-End/UserProfileService/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-network
  SubscriptionServiceDB:
    image: mysql:8.0
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: SubscriptionDb
      MYSQL_ROOT_PASSWORD: admin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - SubscriptionServiceDB-data:/var/lib/mysql
    networks:
      - ecommerce-network
  OrderServiceDB:
    image: mysql:8.0
    ports:
      - "3311:3306"
    environment:
      MYSQL_DATABASE: OrderServiceDb
      MYSQL_ROOT_PASSWORD: admin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - OrderServiceDB-data:/var/lib/mysql
    networks:
      - ecommerce-network
  ReviwServiceDB:
    image: postgres:15-alpine
    container_name: review-postgres
    environment:
      POSTGRES_DB: reviewdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "3312:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U postgres -d reviewdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce-network
  RepportServiceDB:
    image: mysql:8.0
    ports:
      - "3313:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: ReportServiceDB
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - RepportServiceDB-data:/var/lib/mysql
      - ./Back-End/RepportsService/initial/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-network
  #___Micro-Services___
  AuthServiceAPI:
    build: 
      context: ./Back-End/AuthService
      dockerfile: dockerfile
    image: authservice-api:latest
    container_name: authservice-api 
    ports:
      - "5001:5181"
      #- "5002:7214"
    depends_on:
      AuthServiceDB:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5181
        - ConnectionStrings__DefaultConnection=Server=AuthServiceDB;Port=3306;Database=AuthService;User=root;Password=admin;
        - Kafka__BootstrapServers=kafka:29092
    networks:
        - ecommerce-network
  ProductServiceAPI:
    build:
      context: ./Back-End/ProductService
      dockerfile: dockerfile
    image: productservice-api:latest
    container_name: productservice-api
    ports:
      - "5002:5252"
    depends_on:
      ProductServiceDB:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5252
        - ConnectionStrings__DefaultConnection=Server=ProductServiceDB;Port=3306;Database=ProductsDb;User=root;Password=admin;
        - Kafka__BootstrapServers=kafka:29092
    networks:
      - ecommerce-network
  CartServiceAPI:
    build:
      context: ./Back-End/CartService
      dockerfile: Dockerfile
    image: cartservice-api:latest
    container_name: cartservice-api
    ports:
      - "5003:5279"
    depends_on:
      CartServiceDB:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5279
        - ConnectionStrings__DefaultConnection=Server=CartServiceDB;Port=3306;Database=CartDb;User=root;Password=admin;
        - Kafka__BootstrapServers=kafka:29092
    networks:
      - ecommerce-network
  UserProfileServiceAPI:
    build:
      context: ./Back-End/UserProfileService
      dockerfile: Dockerfile
    image: userprofileservice-api:latest
    container_name: userprofileservice-api
    ports:
      - "5004:5353"
    depends_on:
      UserProfileDB:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5353
        - ConnectionStrings__DefaultConnection=Server=UserProfileDB;Port=3306;Database=UserProfileDb;User=root;Password=admin;
        - Kafka__BootstrapServers=kafka:29092
    networks:
      - ecommerce-network
  SubscriptionServiceAPI:
    build:
      context: ./Back-End/SubscriptionService
      dockerfile: dockerfile
    image: subscriptionservice-api:latest
    container_name: subscriptionservice-api
    ports:
      - "5005:5353"
    depends_on:
      SubscriptionServiceDB:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5353
        - ConnectionStrings__DefaultConnection=Server=SubscriptionServiceDB;Port=3306;Database=SubscriptionDb;User=root;Password=admin;
        - Kafka__BootstrapServers=kafka:29092
    networks:
      - ecommerce-network
  orderservice.api:
    build:
      context: ./Back-End/OrderService
      dockerfile: dockerfile
    ports:
      - "5006:5038"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5038
      - ConnectionStrings__DefaultConnection=Server=OrderServiceDB;Port=3306;Database=OrderServiceDb;User=root;Password=admin;
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      OrderServiceDB:
        condition: service_healthy
    networks:
      - ecommerce-network
  
  
  review-service.api:
    build: 
      context: ./Back-End/ReviewService
      dockerfile: Dockerfile
    container_name: review-service
    ports:
      - "5007:5252"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ReviwServiceDB:5432/reviewdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 5252 
    depends_on:
      ReviwServiceDB:
        condition: service_healthy
    networks:
      - ecommerce-network
  AdminLogsServiceAPI:
    build:
      context: ./Back-End/AdminLogsService
      dockerfile: Dockerfile
    image: adminlogsservice-api:latest
    container_name: adminlogsservice-api
    ports:
      - "5009:5026"
    volumes:
        - ./Back-End/AdminLogsService/AuditLogs:/app/AuditLogs  # Add this line
    depends_on:
      kafka:
        condition: service_started
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_URLS=http://+:5026  
        - Kafka__BootstrapServers=kafka:29092
    networks:
      - ecommerce-network
  repportservice-api:
    build:
      context: ./Back-End/RepportsService/initial
      dockerfile: Dockerfile
    image: repportservice-api:latest
    container_name: repportservice-api
    ports:
      - "5008:8081"
    depends_on:
      RepportServiceDB:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://RepportServiceDB:3306/ReportServiceDB
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    volumes:
      - ./logs/repport:/app/logs
    networks:
      - ecommerce-network

volumes:
  AuthServiceDB-data: 
    driver: local
  ProductServiceDB-data:
    driver: local
  CartServiceDB-data:
    driver: local
  UserProfileDB-data:
    driver: local
  SubscriptionServiceDB-data:
    driver: local
  OrderServiceDB-data:
    driver: local
  postgres_data:
    driver: local
  RepportServiceDB-data:
    driver: local
networks:
  ecommerce-network:
    driver: bridge