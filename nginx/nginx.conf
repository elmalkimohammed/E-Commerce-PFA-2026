###############################################################################
#  NGINX REVERSE PROXY — E-Commerce Microservices
#  -----------------------------------------------
#  Point d'entrée unique (port 80) pour TOUS les microservices.
#  Chaque service backend est accessible via son path original.
###############################################################################

# ─── Performance globale ─────────────────────────────────────────────────────
worker_processes auto;                  # Utilise tous les cœurs CPU disponibles
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;            # Connexions simultanées par worker
}

http {
    # ─── Paramètres de base ──────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ─── Format de log détaillé ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream: $upstream_addr rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # ─── Taille max des requêtes (uploads de produits, etc.) ─────────────────
    client_max_body_size 50M;

    # ─── Upstream : Définition de chaque microservice ────────────────────────
    # Les noms correspondent aux noms des services dans docker-compose.yml
    # Les ports correspondent aux ports INTERNES des conteneurs

    upstream auth_service {
        server AuthServiceAPI:5181;
    }

    upstream product_service {
        server ProductServiceAPI:5252;
    }

    upstream cart_service {
        server CartServiceAPI:5279;
    }

    upstream userprofile_service {
        server UserProfileServiceAPI:5353;
    }

    upstream subscription_service {
        server SubscriptionServiceAPI:5354;
    }

    upstream order_service {
        server orderservice.api:5038;
    }

    upstream review_service {
        server review-service.api:5253;
    }

    upstream report_service {
        server repportservice-api:8081;
    }

    upstream adminlogs_service {
        server AdminLogsServiceAPI:5026;
    }

    upstream notification_service {
        server notification-service:8086;
    }

    # ─── Serveur principal ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Headers de sécurité ──────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;

        auth_request_set $auth_status $upstream_status;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_email $upstream_http_x_user_email;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_intercept_errors on;
        error_page 401 403 /401.json;

        # ── CORS global (autorise les requêtes authentifiées) ─────────────────────────────────────
        # Géré ici pour centraliser la politique CORS

        # ==================================================================
        # 1. AuthService  (.NET)  —  /api/auth/
        #    Port d'origine : 5001 → interne : 5181
        # ==================================================================
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;

            # Headers proxy standard
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        location = /api/auth/validate {
            proxy_pass http://auth_service/api/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_intercept_errors on;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }

        # ─── Security: Block Direct API Access (Forced URL Typing) ───────────────────
        # This prevents users from typing "localhost/api/..." in their address bar.
        # Browsers set Sec-Fetch-Mode: navigate for address bar hits.
        # React's fetch/XHR uses Sec-Fetch-Mode: cors or same-origin.
        set $is_api_request 0;
        if ($request_uri ~* "^/(api|TechStore)/") {
            set $is_api_request 1;
        }
        
        if ($http_sec_fetch_mode = "navigate") {
            set $block_direct_access "${is_api_request}";
        }
        
        if ($block_direct_access = "1") {
            return 403 '{"error": "Direct API access is forbidden. Please use the web interface."}';
        }

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ==================================================================
        # 2. ProductService  (.NET)  —  /TechStore/ProductService/
        #    Port d'origine : 5002 → interne : 5252
        # ==================================================================
        location /TechStore/ProductService/ {
            auth_request /api/auth/validate;
            proxy_pass http://product_service/TechStore/ProductService/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 3. CartService  (.NET)  —  /api/cart/
        #    Port d'origine : 5003 → interne : 5279
        # ==================================================================
        location /api/cart/ {
            auth_request /api/auth/validate;
            proxy_pass http://cart_service/api/cart/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 4. UserProfileService  (.NET)  —  /api/UserProfile/
        #    Port d'origine : 5004 → interne : 5353
        # ==================================================================
        location /api/UserProfile/ {
            auth_request /api/auth/validate;
            proxy_pass http://userprofile_service/api/UserProfile/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 5. SubscriptionService  (.NET)  —  /api/Subscription/
        #    Port d'origine : 5005 → interne : 5353
        # ==================================================================
        location /api/Subscription/ {
            auth_request /api/auth/validate;
            proxy_pass http://subscription_service/api/Subscription/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 6. OrderService  (.NET)  —  /api/orders/
        #    Port d'origine : 5006 → interne : 5038
        # ==================================================================
        location /api/orders/ {
            auth_request /api/auth/validate;
            proxy_pass http://order_service/api/orders/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 7. ReviewService  (Spring Boot)  —  /api/reviews/
        #    Port d'origine : 5007 → interne : 5252
        # ==================================================================
        location /api/reviews/ {
            auth_request /api/auth/validate;
            proxy_pass http://review_service/api/reviews/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
        location = /repport {
        root /usr/share/nginx/html;
        try_files /index.html =404;
}
        # ==================================================================
        # 8. RepportService  (Spring Boot)  —  /repport/ et /api/audit/
        #    Port d'origine : 5008 → interne : 8081
        # ==================================================================
        location /api/repport {
            auth_request /api/auth/validate;
            proxy_pass http://report_service/repport/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        location /api/audit/ {
            auth_request /api/auth/validate;
            proxy_pass http://report_service/api/audit/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 9. AdminLogsService  (.NET)  —  /api/Audit/
        #    Port d'origine : 5009 → interne : 5026
        #    Note : Le contrôleur s'appelle AuditController → /api/Audit/
        # ==================================================================
        location /api/Audit/ {
            auth_request /api/auth/validate;
            proxy_pass http://adminlogs_service/api/Audit/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
        
        location /api/inventory/ {
            auth_request /api/auth/validate;
            proxy_pass http://adminlogs_service/api/inventory/;
            
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;
            
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }


        # ==================================================================
        # 10. NotificationService  (Spring Boot)  —  /api/notifications/
        #     Port d'origine : 5010 → interne : 8086
        # ==================================================================
        location /api/notifications/ {
            auth_request /api/auth/validate;
            proxy_pass http://notification_service/api/notifications/;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Origin,Content-Type,Accept,X-Requested-With" always;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization      $http_authorization;
            proxy_set_header X-User-Id          $user_id;
            proxy_set_header X-User-Email       $user_email;
            proxy_set_header X-User-Role        $user_role;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        location = /401.json {
            internal;
            default_type application/json;
            return 401 '{"error":"Unauthorized"}';
        }

        location = /403.json {
            internal;
            default_type application/json;
            return 403 '{"error":"Forbidden - Direct Access Blocked"}';
        }

        # ==================================================================
        # Frontend React — Servir l'application depuis le build dist/
        # ==================================================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ==================================================================
        # Health Check — Pour vérifier que Nginx est actif
        # ==================================================================
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # ==================================================================
        # Page d'erreur par défaut
        # ==================================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
