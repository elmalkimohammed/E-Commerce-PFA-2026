###############################################################################
#  NGINX REVERSE PROXY — E-Commerce Microservices
#  -----------------------------------------------
#  Point d'entrée unique (port 80) pour TOUS les microservices.
#  Chaque service backend est accessible via son path original.
###############################################################################

# ─── Performance globale ─────────────────────────────────────────────────────
worker_processes auto;                  # Utilise tous les cœurs CPU disponibles
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;            # Connexions simultanées par worker
}

http {
    # ─── Paramètres de base ──────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ─── Format de log détaillé ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream: $upstream_addr rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # ─── Taille max des requêtes (uploads de produits, etc.) ─────────────────
    client_max_body_size 50M;

    # ─── Upstream : Définition de chaque microservice ────────────────────────
    # Les noms correspondent aux noms des services dans docker-compose.yml
    # Les ports correspondent aux ports INTERNES des conteneurs

    upstream auth_service {
        server AuthServiceAPI:5181;
    }

    upstream product_service {
        server ProductServiceAPI:5252;
    }

    upstream cart_service {
        server CartServiceAPI:5279;
    }

    upstream userprofile_service {
        server UserProfileServiceAPI:5353;
    }

    upstream subscription_service {
        server SubscriptionServiceAPI:5354;
    }

    upstream order_service {
        server orderservice.api:5038;
    }

    upstream review_service {
        server review-service.api:5252;
    }

    upstream report_service {
        server repportservice-api:8081;
    }

    upstream adminlogs_service {
        server AdminLogsServiceAPI:5026;
    }

    upstream notification_service {
        server notification-service:8086;
    }

    # ─── Serveur principal ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Headers de sécurité ──────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── CORS global (autorise le frontend React) ─────────────────────────
        # Géré ici pour centraliser la politique CORS
        # ─────────────────────────────────────────────────────────────────────

        # ==================================================================
        # 1. AuthService  (.NET)  —  /api/auth/
        #    Port d'origine : 5001 → interne : 5181
        # ==================================================================
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;

            # Headers proxy standard
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 2. ProductService  (.NET)  —  /TechStore/ProductService/
        #    Port d'origine : 5002 → interne : 5252
        # ==================================================================
        location /TechStore/ProductService/ {
            proxy_pass http://product_service/TechStore/ProductService/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 3. CartService  (.NET)  —  /api/cart/
        #    Port d'origine : 5003 → interne : 5279
        # ==================================================================
        location /api/cart/ {
            proxy_pass http://cart_service/api/cart/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 4. UserProfileService  (.NET)  —  /api/UserProfile/
        #    Port d'origine : 5004 → interne : 5353
        # ==================================================================
        location /api/UserProfile/ {
            proxy_pass http://userprofile_service/api/UserProfile/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 5. SubscriptionService  (.NET)  —  /api/Subscription/
        #    Port d'origine : 5005 → interne : 5353
        # ==================================================================
        location /api/Subscription/ {
            proxy_pass http://subscription_service/api/Subscription/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 6. OrderService  (.NET)  —  /api/orders/
        #    Port d'origine : 5006 → interne : 5038
        # ==================================================================
        location /api/orders/ {
            proxy_pass http://order_service/api/orders/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 7. ReviewService  (Spring Boot)  —  /api/reviews/
        #    Port d'origine : 5007 → interne : 5252
        # ==================================================================
        location /api/reviews/ {
            proxy_pass http://review_service/api/reviews/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 8. RepportService  (Spring Boot)  —  /repport/ et /api/audit/
        #    Port d'origine : 5008 → interne : 8081
        # ==================================================================
        location /repport/ {
            proxy_pass http://report_service/repport/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        location /api/audit/ {
            proxy_pass http://report_service/api/audit/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 9. AdminLogsService  (.NET)  —  /api/Audit/
        #    Port d'origine : 5009 → interne : 5026
        #    Note : Le contrôleur s'appelle AuditController → /api/Audit/
        # ==================================================================
        location /api/Audit/ {
            proxy_pass http://adminlogs_service/api/Audit/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # 10. NotificationService  (Spring Boot)  —  /api/notifications/
        #     Port d'origine : 5010 → interne : 8086
        # ==================================================================
        location /api/notifications/ {
            proxy_pass http://notification_service/api/notifications/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ==================================================================
        # Frontend React — Servir l'application depuis le build dist/
        # ==================================================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ==================================================================
        # Health Check — Pour vérifier que Nginx est actif
        # ==================================================================
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # ==================================================================
        # Page d'erreur par défaut
        # ==================================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
